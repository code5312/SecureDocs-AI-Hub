name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feature/document-extraction-main

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
      - name: Backend tests
        working-directory: backend
        run: python -m pytest -q
      - name: Alembic single head
        working-directory: backend
        run: |
          heads=$(python -m alembic heads | wc -l | tr -d ' ')
          test "$heads" = "1"
      - name: Python compile smoke
        run: python -m py_compile backend/app/worker.py backend/app/extraction/*.py scripts/extraction_smoke_test.py

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Frontend auth tests
        working-directory: frontend
        run: npm run test:auth
      - name: Frontend document tests
        working-directory: frontend
        run: npm run test:documents
      - name: Type check
        working-directory: frontend
        run: npm run type-check
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Build
        working-directory: frontend
        run: npm run build

  configuration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shell syntax
        run: bash -n scripts/verify.sh scripts/verify_phase_a.sh
      - name: Whitespace check
        run: git diff --check
      - name: Docker Compose config
        run: |
          cp .env.example .env
          docker compose --profile test --profile worker config >/dev/null
